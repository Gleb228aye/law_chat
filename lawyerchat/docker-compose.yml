services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: legal_rag_postgres
    environment:
      POSTGRES_DB: legal_rag
      POSTGRES_USER: legal_user
      POSTGRES_PASSWORD: legal_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legal_user -d legal_rag"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: legal_rag_backend
    ports:
      - "8000:8000"
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      DATABASE_URL: postgresql+psycopg2://legal_user:legal_password@postgres:5432/legal_rag
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

volumes:
  postgres_data:
